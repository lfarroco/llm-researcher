name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install ruff

      - name: Run ruff
        run: ruff check app/

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests (excluding e2e)
        env:
          DATABASE_URL: "sqlite:///:memory:"
          LLM_PROVIDER: "openai"
          LLM_MODEL: "gpt-4o"
          OPENAI_API_KEY: "sk-test"
        run: pytest tests/ -v --ignore=tests/e2e_test.py
